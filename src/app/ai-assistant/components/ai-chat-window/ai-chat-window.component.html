<div class="chat-window">
  <!-- Messages Container -->
  <div class="messages-container" #messagesContainer>
    <div class="messages-list">
      <!-- Welcome Message -->
      <div class="message assistant" *ngIf="messages.length === 0">
        <div class="message-avatar">🤖</div>
        <div class="message-content">
          <p>👋 Hello! I'm your AI data assistant.</p>
          <p>Upload a dataset and I'll help you analyze it, generate insights, and create visualizations.</p>
          <p>Try these prompts:</p>
        </div>
      </div>

      <!-- Chat Messages -->
      <div 
        *ngFor="let message of messages" 
        class="message"
        [class.user]="message.role === 'user'"
        [class.assistant]="message.role === 'assistant'"
      >
        <div class="message-avatar">
          {{ message.role === 'user' ? '👤' : '🤖' }}
        </div>
        <div class="message-content">
          <!-- Loading State -->
          <div class="typing-indicator" *ngIf="message.isLoading">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <!-- Message Content -->
          <div *ngIf="!message.isLoading" class="message-text">
            <pre>{{ message.content }}</pre>
          </div>
          <div class="message-time">
            {{ formatTime(message.timestamp) }}
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Suggestions -->
  <div class="suggestions" *ngIf="suggestions.length > 0">
    <span class="suggestions-label">Quick prompts:</span>
    <div class="suggestions-list">
      <button 
        *ngFor="let suggestion of suggestions" 
        class="suggestion-btn"
        (click)="onSuggestionClick(suggestion)"
      >
        {{ suggestion }}
      </button>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea 
        [(ngModel)]="newMessage"
        (keydown)="onEnterPressed($event)"
        placeholder="Ask me anything about your data..."
        rows="1"
      ></textarea>
      <button 
        class="send-btn"
        (click)="sendMessage()"
        [disabled]="!newMessage.trim() || isProcessing"
      >
        <span *ngIf="!isProcessing">➤</span>
        <span *ngIf="isProcessing" class="spinner"></span>
      </button>
    </div>
  </div>
</div>
