<div class="profile-container">
  <!-- Header -->
  <header class="profile-header">
    <div class="header-content">
      <button class="back-btn" (click)="goBack()">
        <span>←</span> Back
      </button>
      <h1>My Profile</h1>
      <div class="header-actions">
        <button class="edit-btn" (click)="toggleEdit()">
          {{ isEditing ? 'Cancel' : 'Edit Profile' }}
        </button>
      </div>
    </div>
  </header>

  <!-- Profile Content -->
  <div class="profile-content">
    <!-- Profile Picture Section -->
    <div class="profile-picture-section">
      <div class="profile-picture">
        <span class="profile-icon-large">👤</span>
        <div class="profile-overlay" *ngIf="isEditing">
          <label for="profile-upload" class="upload-label">
            Change Photo
          </label>
          <input type="file" id="profile-upload" accept="image/*" (change)="onFileSelected($event)" hidden />
        </div>
      </div>
      <h2 class="profile-name">{{ profile.firstName }} {{ profile.lastName }}</h2>
      <p class="profile-email">{{ profile.email }}</p>
    </div>

    <!-- Profile Details Section -->
    <div class="profile-details-section">
      <h3>Personal Information</h3>
      
      <div class="details-grid">
        <!-- First Name -->
        <div class="detail-item">
          <label>First Name</label>
          <input 
            type="text" 
            [(ngModel)]="profile.firstName" 
            [readonly]="!isEditing"
            [class.editable]="isEditing"
            placeholder="Enter first name"
          />
        </div>

        <!-- Last Name -->
        <div class="detail-item">
          <label>Last Name</label>
          <input 
            type="text" 
            [(ngModel)]="profile.lastName" 
            [readonly]="!isEditing"
            [class.editable]="isEditing"
            placeholder="Enter last name"
          />
        </div>

        <!-- Email -->
        <div class="detail-item">
          <label>Email Address</label>
          <input 
            type="email" 
            [(ngModel)]="profile.email" 
            [readonly]="!isEditing"
            [class.editable]="isEditing"
            placeholder="Enter email address"
          />
        </div>

        <!-- Phone -->
        <div class="detail-item">
          <label>Phone Number</label>
          <input 
            type="tel" 
            [(ngModel)]="profile.phone" 
            [readonly]="!isEditing"
            [class.editable]="isEditing"
            placeholder="Enter phone number"
          />
        </div>

        <!-- Date of Birth -->
        <div class="detail-item">
          <label>Date of Birth</label>
          <input 
            type="date" 
            [(ngModel)]="profile.dateOfBirth" 
            [readonly]="!isEditing"
            [class.editable]="isEditing"
          />
        </div>

        <!-- Gender -->
        <div class="detail-item">
          <label>Gender</label>
          <select 
            [(ngModel)]="profile.gender" 
            [disabled]="!isEditing"
            [class.editable]="isEditing"
          >
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
            <option value="prefer-not-to-say">Prefer not to say</option>
          </select>
        </div>

        <!-- Address -->
        <div class="detail-item full-width">
          <label>Address</label>
          <input 
            type="text" 
            [(ngModel)]="profile.address" 
            [readonly]="!isEditing"
            [class.editable]="isEditing"
            placeholder="Enter your address"
          />
        </div>

        <!-- City -->
        <div class="detail-item">
          <label>City</label>
          <input 
            type="text" 
            [(ngModel)]="profile.city" 
            [readonly]="!isEditing"
            [class.editable]="isEditing"
            placeholder="Enter city"
          />
        </div>

        <!-- Country -->
        <div class="detail-item">
          <label>Country</label>
          <input 
            type="text" 
            [(ngModel)]="profile.country" 
            [readonly]="!isEditing"
            [class.editable]="isEditing"
            placeholder="Enter country"
          />
        </div>

        <!-- Bio -->
        <div class="detail-item full-width">
          <label>Bio</label>
          <textarea 
            [(ngModel)]="profile.bio" 
            [readonly]="!isEditing"
            [class.editable]="isEditing"
            placeholder="Tell us about yourself..."
            rows="4"
          ></textarea>
        </div>
      </div>

      <!-- Save Button -->
      <div class="action-buttons" *ngIf="isEditing">
        <button class="save-btn" (click)="saveProfile()">
          Save Changes
        </button>
        <button class="cancel-btn" (click)="toggleEdit()">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
