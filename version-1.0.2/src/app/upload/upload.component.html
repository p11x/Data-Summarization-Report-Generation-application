<div class="upload-container">
  <div class="upload-card">
    <div class="upload-header">
      <button class="back-btn" (click)="goBack()">← Back</button>
      <h2>Upload File</h2>
    </div>

    <div *ngIf="uploadSuccess" class="success-message">
      ✓ File uploaded successfully! Redirecting to analysis...
    </div>

    <div *ngIf="uploadError" class="error-message">
      {{ uploadError }}
    </div>

    <div *ngIf="uploading && processingMessage" class="processing-message">
      <div class="spinner"></div>
      <p>{{ processingMessage }}</p>
    </div>

    <div class="upload-area" [class.disabled]="uploading">
      <div class="upload-icon">📁</div>
      <p>Drag and drop your file here, or</p>
      <label class="file-label">
        <input 
          type="file" 
          id="fileUpload" 
          (change)="onFileSelected($event)"
          class="file-input"
          accept=".csv,.txt,.xlsx,.xls,.pdf,.xml,.html,.htm,.docx"
        />
        <span class="browse-btn">Browse Files</span>
      </label>
      <p class="file-hint">Supported formats: CSV, TXT, Excel (.xlsx, .xls), PDF, XML, HTML, DOCX</p>
    </div>

    <div *ngIf="selectedFile" class="selected-file">
      <span class="file-icon">📄</span>
      <div class="file-info">
        <p class="file-name">{{ selectedFile.name }}</p>
        <p class="file-size">{{ (selectedFile.size / 1024).toFixed(2) }} KB</p>
      </div>
    </div>

    <button 
      class="upload-btn" 
      (click)="onUpload()" 
      [disabled]="!selectedFile || uploading"
    >
      {{ uploading ? 'Processing...' : 'Upload & Analyze' }}
    </button>
  </div>
</div>
