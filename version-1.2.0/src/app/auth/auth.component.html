<div class="auth-container">
  <div class="auth-card">
    <h2>{{ isLoginMode ? 'Login' : 'Create Account' }}</h2>
    
    <div *ngIf="registrationSuccess" class="success-message">
      Account created successfully! Please login.
    </div>

    <!-- Login Form -->
    <form *ngIf="isLoginMode" [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="login-email">Email:</label>
        <input id="login-email" formControlName="email" type="email" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password:</label>
        <input id="login-password" formControlName="password" type="password" required />
      </div>
      <button type="submit" [disabled]="loginForm.invalid">Login</button>
    </form>

    <!-- Register Form -->
    <form *ngIf="!isLoginMode" [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <div class="form-group">
        <label for="register-email">Email:</label>
        <input id="register-email" formControlName="email" type="email" required />
      </div>
      <div class="form-group">
        <label for="register-password">Password:</label>
        <input id="register-password" formControlName="password" type="password" required />
        <small *ngIf="registerForm.get('password')?.errors?.['minlength']">
          Password must be at least 6 characters
        </small>
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password:</label>
        <input id="confirm-password" formControlName="confirmPassword" type="password" required />
        <small *ngIf="registerForm.errors?.['mismatch']">
          Passwords do not match
        </small>
      </div>
      <button type="submit" [disabled]="registerForm.invalid">Create Account</button>
    </form>

    <div class="toggle-mode">
      <span *ngIf="isLoginMode">Don't have an account?</span>
      <span *ngIf="!isLoginMode">Already have an account?</span>
      <button type="button" (click)="toggleMode()">
        {{ isLoginMode ? 'Create Account' : 'Login' }}
      </button>
    </div>
  </div>
</div>
