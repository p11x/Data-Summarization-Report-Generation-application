<div class="result-card" [class.expanded]="isExpanded">
  <!-- Header -->
  <div class="card-header" (click)="toggleExpand()">
    <div class="type-icon" [style.background]="getTypeColor()">
      {{ getTypeIcon() }}
    </div>
    <div class="header-info">
      <h4>{{ result.title }}</h4>
      <span class="timestamp">{{ formatDate(result.timestamp) }}</span>
    </div>
    <div class="expand-icon">{{ isExpanded ? '▼' : '▶' }}</div>
  </div>

  <!-- Content Preview -->
  <div class="card-content" *ngIf="!isExpanded">
    <p class="content-preview">{{ result.content.substring(0, 150) }}...</p>
  </div>

  <!-- Expanded Content -->
  <div class="card-expanded" *ngIf="isExpanded">
    <div class="content-full">
      <pre>{{ result.content }}</pre>
    </div>
    
    <!-- Chart Preview -->
    <div class="chart-preview" *ngIf="result.chartData">
      <div class="chart-placeholder">
        <span class="chart-icon">📈</span>
        <span>Chart visualization available</span>
        <span class="chart-type">{{ result.chartData.type }} chart</span>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="card-actions">
    <button class="action-btn" (click)="onViewDetails()">
      View Details
    </button>
    <button class="action-btn primary" (click)="goToReport()">
      Add to Report
    </button>
  </div>
</div>
